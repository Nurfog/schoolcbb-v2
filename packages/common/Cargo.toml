[package]
name = "schoolcbb-common"
version = "0.1.0"
edition = "2021"

[features]
default = ["db"]
db = ["dep:sqlx", "dep:tracing"]

[dependencies]
serde = { version = "1", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
uuid = { version = "1", features = ["serde"] }
sqlx = { version = "0.8", optional = true, default-features = false, features = ["runtime-tokio", "postgres", "uuid", "chrono"] }
tracing = { version = "0.1", optional = true }
