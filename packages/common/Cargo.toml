[package]
name = "schoolccb-common"
version = "0.1.0"
edition = "2024"

[features]
default = ["db"]
db = ["dep:sqlx"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
uuid = { version = "1", features = ["serde", "v4", "js"] }
sqlx = { version = "0.8", optional = true, default-features = false, features = ["runtime-tokio", "postgres", "uuid", "chrono", "derive"] }
tracing = "0.1"
tokio = { version = "1", features = ["sync"] }
async-trait = "0.1"

[dev-dependencies]
approx = "0.5"
serde_json = "1"
