[package]
name = "schoolcbb-frontend"
version = "0.1.0"
edition = "2021"

[dependencies]
schoolcbb-core = { path = "../core" }
dioxus = { version = "0.6", features = ["web", "router"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["json"] }
wasm-bindgen = "0.2"
