[package]
name = "schoolcbb-frontend"
version = "0.1.0"
edition = "2021"

[dependencies]
schoolcbb-common = { path = "../common", default-features = false }
dioxus = { version = "0.6", features = ["web", "router"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["json"] }
wasm-bindgen = "0.2"
getrandom = { version = "0.2", features = ["js"] }
getrandom_04 = { package = "getrandom", version = "0.4", features = ["wasm_js"], optional = true }
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window", "Storage", "Location", "Navigator", "ServiceWorkerRegistration", "ServiceWorkerContainer"] }
js-sys = "0.3"
