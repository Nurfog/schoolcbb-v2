<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <meta name="description" content="SchoolCBB - Plataforma de gestión escolar integral para colegios chilenos. Administra alumnos, notas, asistencia, finanzas y más.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: #1a2b3c; background: #f8f9fa; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
        nav { background: #1a2b3c; padding: 1rem 0; position: sticky; top: 0; z-index: 100; }
        nav .container { display: flex; align-items: center; justify-content: space-between; }
        nav .logo { color: #fff; font-size: 1.5rem; font-weight: 800; text-decoration: none; }
        nav .logo span { color: #4fc3f7; }
        nav .nav-links { display: flex; gap: 2rem; }
        nav .nav-links a { color: #b0bec5; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        nav .nav-links a:hover { color: #fff; }
        nav .cta-btn { background: #4fc3f7; color: #1a2b3c; padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: 700; text-decoration: none; transition: background 0.2s; }
        nav .cta-btn:hover { background: #29b6f6; }
        footer { background: #1a2b3c; color: #b0bec5; padding: 3rem 0; margin-top: 4rem; }
        footer .container { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 2rem; }
        footer h4 { color: #fff; margin-bottom: 1rem; }
        footer a { color: #4fc3f7; text-decoration: none; }
        .hero { background: linear-gradient(135deg, #1a2b3c 0%, #243b4f 100%); color: #fff; padding: 6rem 0; text-align: center; }
        .hero h1 { font-size: 3rem; font-weight: 800; margin-bottom: 1.5rem; }
        .hero p { font-size: 1.2rem; color: #b0bec5; max-width: 700px; margin: 0 auto 2rem; }
        .hero .btn-primary { background: #4fc3f7; color: #1a2b3c; padding: 1rem 2.5rem; border-radius: 8px; font-weight: 700; font-size: 1.1rem; text-decoration: none; display: inline-block; transition: background 0.2s; }
        .hero .btn-primary:hover { background: #29b6f6; }
        .section { padding: 4rem 0; }
        .section h2 { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 3rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .card { background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .card:hover { transform: translateY(-4px); }
        .card h3 { font-size: 1.2rem; margin-bottom: 0.8rem; }
        .card p { color: #546e7a; font-size: 0.95rem; }
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; align-items: start; }
        .pricing-card { background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; position: relative; }
        .pricing-card.featured { border: 2px solid #4fc3f7; transform: scale(1.05); }
        .pricing-card .badge { background: #4fc3f7; color: #1a2b3c; padding: 0.3rem 1rem; border-radius: 20px; font-weight: 700; font-size: 0.8rem; display: inline-block; margin-bottom: 1rem; }
        .pricing-card .price { font-size: 2.5rem; font-weight: 800; margin: 1rem 0; }
        .pricing-card .price small { font-size: 1rem; font-weight: 400; color: #546e7a; }
        .pricing-card ul { list-style: none; text-align: left; margin: 1.5rem 0; }
        .pricing-card ul li { padding: 0.5rem 0; border-bottom: 1px solid #eceff1; }
        .pricing-card ul li::before { content: "✓"; color: #4caf50; font-weight: 700; margin-right: 0.5rem; }
        .pricing-card ul li.missing { color: #b0bec5; }
        .pricing-card ul li.missing::before { content: "—"; color: #cfd8dc; }
        .pricing-card .btn { background: #1a2b3c; color: #fff; padding: 0.8rem 2rem; border-radius: 8px; font-weight: 600; text-decoration: none; display: inline-block; transition: background 0.2s; }
        .pricing-card .btn:hover { background: #243b4f; }
        .btn-outline { background: transparent; border: 2px solid #1a2b3c; color: #1a2b3c; padding: 0.8rem 2rem; border-radius: 8px; font-weight: 600; text-decoration: none; display: inline-block; }
        form input, form textarea { width: 100%; padding: 0.8rem; border: 1px solid #cfd8dc; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 1rem; margin-bottom: 1rem; }
        form textarea { min-height: 150px; resize: vertical; }
        form button { background: #1a2b3c; color: #fff; padding: 0.8rem 2rem; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; }
        .feature-item { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .feature-item h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .feature-item p { color: #546e7a; font-size: 0.9rem; }
        .about-content { max-width: 800px; margin: 0 auto; }
        .about-content p { margin-bottom: 1.5rem; font-size: 1.1rem; color: #37474f; }
        @media (max-width: 768px) {
            nav .nav-links { display: none; }
            .hero h1 { font-size: 2rem; }
            .pricing-card.featured { transform: none; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo">School<span>CBB</span></a>
            <div class="nav-links">
                <a href="/">Inicio</a>
                <a href="/features">Características</a>
                <a href="/pricing">Planes</a>
                <a href="/about">Nosotros</a>
                <a href="/contact">Contacto</a>
            </div>
            <a href="/login" class="cta-btn">Ingresar</a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        <div class="container">
            <div>
                <h4>SchoolCBB</h4>
                <p>Plataforma de gestión escolar integral<br>para colegios chilenos.</p>
            </div>
            <div>
                <h4>Enlaces</h4>
                <a href="/features">Características</a><br>
                <a href="/pricing">Planes y Precios</a><br>
                <a href="/about">Sobre Nosotros</a><br>
                <a href="/contact">Contacto</a>
            </div>
            <div>
                <h4>Contacto</h4>
                <p>hola@schoolccb.cl</p>
                <p>Santiago, Chile</p>
            </div>
        </div>
    </footer>
</body>
</html>
