name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/schoolcbb_test
  JWT_SECRET: test-secret
  GATEWAY_HOST: 0.0.0.0
  GATEWAY_PORT: 3000
  FRONTEND_URL: http://localhost:8080
  IDENTITY_URL: http://localhost:3001
  SIS_URL: http://localhost:3002
  ACADEMIC_URL: http://localhost:3003
  ATTENDANCE_URL: http://localhost:3004
  NOTIFICATIONS_URL: http://localhost:3005
  FINANCE_URL: http://localhost:3006
  REPORTING_URL: http://localhost:3007

jobs:
  backend:
    name: Backend (Build & Test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolcbb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Check formatting
        run: cargo fmt --all --check
        continue-on-error: true

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
        continue-on-error: true

      - name: Build workspace
        run: cargo build --workspace --exclude schoolcbb-frontend

      - name: Run backend tests
        run: cargo test --workspace --exclude schoolcbb-frontend

  frontend:
    name: Frontend (Dioxus WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version "^0.6"

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build frontend
        run: cargo build -p schoolcbb-frontend

      - name: Check Dioxus build
        run: dx build --release
        working-directory: packages/frontend
        continue-on-error: true
