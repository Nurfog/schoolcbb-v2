resolver 127.0.0.11 valid=10s;

gzip on;
gzip_comp_level 6;
gzip_types text/plain text/css text/javascript application/javascript application/json application/wasm image/svg+xml image/png image/x-icon;
gzip_min_length 256;
gzip_vary on;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:* ws://localhost:* https://schoolcbb.cl; img-src 'self' data:; manifest-src 'self';" always;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /robots.txt {
        add_header Content-Type "text/plain; charset=utf-8";
    }

    location /sitemap.xml {
        add_header Content-Type "application/xml; charset=utf-8";
    }

    location /manifest.json {
        add_header Content-Type "application/json; charset=utf-8";
    }

    location /service-worker.js {
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        set $gateway_upstream http://gateway:3000;
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        set $gateway_ws http://gateway:3000;
        proxy_pass $gateway_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
