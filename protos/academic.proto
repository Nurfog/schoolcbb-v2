syntax = "proto3";

package academic;

service AcademicService {
    rpc GetStudentReport (StudentReportRequest) returns (StudentReportResponse);
    rpc GetSubjectList (SubjectListRequest) returns (SubjectListResponse);
    rpc GetCoursePerformance (CoursePerformanceRequest) returns (CoursePerformanceResponse);
}

message StudentReportRequest {
    string student_id = 1;
    int32 year = 2;
}

message StudentReportResponse {
    string student_id = 1;
    string student_name = 2;
    double global_average = 3;
    string final_promotion = 4;
    repeated SemesterData semesters = 5;
}

message SemesterData {
    int32 semester = 1;
    double global_average = 2;
    repeated SubjectGrade subjects = 3;
}

message SubjectGrade {
    string subject_name = 1;
    string subject_code = 2;
    double average = 3;
    int32 grades_count = 4;
    double min_grade = 5;
    double max_grade = 6;
}

message SubjectListRequest {}

message SubjectListResponse {
    repeated Subject subjects = 1;
}

message Subject {
    string id = 1;
    string code = 2;
    string name = 3;
    string level = 4;
    int32 hours_per_week = 5;
    bool active = 6;
}

message CoursePerformanceRequest {
    string course_id = 1;
    int32 year = 2;
}

message CoursePerformanceResponse {
    string course_id = 1;
    int32 year = 2;
    repeated SubjectPerformance subjects = 3;
}

message SubjectPerformance {
    string subject_name = 1;
    string subject_code = 2;
    repeated StudentGradeEntry students = 3;
}

message StudentGradeEntry {
    string student_id = 1;
    string student_name = 2;
    string rut = 3;
    repeated double grades = 4;
    double average = 5;
}
