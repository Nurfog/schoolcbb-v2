syntax = "proto3";

package reporting;

service ReportingService {
    rpc GetCertificate (CertificateRequest) returns (CertificateResponse);
    rpc GetGradeConcentration (ConcentrationRequest) returns (ConcentrationResponse);
}

message CertificateRequest {
    string student_id = 1;
}

message CertificateResponse {
    string student_name = 1;
    string rut = 2;
    string grade_level = 3;
    string section = 4;
    int32 year = 5;
    string enrollment_status = 6;
    string issued_at = 7;
}

message ConcentrationRequest {
    string student_id = 1;
    int32 year = 2;
}

message ConcentrationResponse {
    string student_name = 1;
    string rut = 2;
    int32 year = 3;
    string final_promotion = 4;
    double final_average = 5;
    repeated SemesterConcentration semesters = 6;
}

message SemesterConcentration {
    int32 semester = 1;
    double global_average = 2;
    repeated SubjectConcentration subjects = 3;
}

message SubjectConcentration {
    string subject_name = 1;
    string subject_code = 2;
    repeated double grades = 3;
    double average = 4;
}
