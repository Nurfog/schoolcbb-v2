      retries: 10
      start_period: 30s

  reporting:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-reporting
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3007
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3007/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 30s

  portal:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-portal
    ports:
      - "3010:3010"
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3010
      RUST_LOG: info
      IDENTITY_URL: http://identity:3001
      FRONTEND_URL: http://localhost:8080
    depends_on:
      identity:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3010/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 30s

  curriculum:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-curriculum
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3011
      RUST_LOG: info
      CURRICULUM_KB_DIR: /app/.agents/skills/cn
    volumes:
      - ./.agents:/app/.agents:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3011/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 30s

  gateway:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-gateway
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      RUST_LOG: info
      FRONTEND_URL: http://localhost:8080
      IDENTITY_URL: http://identity:3001
      SIS_URL: http://sis:3002
      ACADEMIC_URL: http://academic:3003
      ATTENDANCE_URL: http://attendance:3004
      NOTIFICATIONS_URL: http://notifications:3005
      FINANCE_URL: http://finance:3006
      REPORTING_URL: http://reporting:3007
      PORTAL_URL: http://portal:3010
      CURRICULUM_URL: http://curriculum:3011
    depends_on:
      identity:
        condition: service_healthy
      sis:
        condition: service_healthy
      academic:
        condition: service_healthy
      attendance:
        condition: service_healthy
      notifications:
        condition: service_healthy
      finance:
        condition: service_healthy
      reporting:
        condition: service_healthy
      portal:
        condition: service_healthy
      curriculum:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  pgdata:
