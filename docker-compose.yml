services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: schoolccb
      POSTGRES_PASSWORD: schoolccb
      POSTGRES_DB: schoolccb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolccb"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-gateway
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      RUST_LOG: info
      FRONTEND_URL: http://localhost:8080
      IDENTITY_URL: http://identity:3001
      SIS_URL: http://sis:3002
      ACADEMIC_URL: http://academic:3003
      ATTENDANCE_URL: http://attendance:3004
      NOTIFICATIONS_URL: http://notifications:3005
      FINANCE_URL: http://finance:3006
      REPORTING_URL: http://reporting:3007
      PORTAL_URL: http://portal:3010
    depends_on:
      - identity

  identity:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-identity
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy

  sis:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-sis
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy

  academic:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-academic
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3003
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy

  attendance:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-attendance
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3004
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy

  notifications:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-notifications
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3005
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy

  finance:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-finance
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3006
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy

  reporting:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-reporting
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3007
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy

  portal:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-portal
    ports:
      - "3010:3010"
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3010
      RUST_LOG: info
      IDENTITY_URL: http://identity:3001
      FRONTEND_URL: http://localhost:8080
    depends_on:
      - identity

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - gateway

volumes:
  pgdata:
