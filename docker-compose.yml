services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: schoolcbb
      POSTGRES_PASSWORD: schoolcbb
      POSTGRES_DB: schoolcbb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/common/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolcbb"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolcbb-gateway
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      RUST_LOG: info
      FRONTEND_URL: http://localhost:8080
      IDENTITY_URL: http://identity:3001
      SIS_URL: http://sis:3002
      ACADEMIC_URL: http://academic:3003
      ATTENDANCE_URL: http://attendance:3004
      NOTIFICATIONS_URL: http://notifications:3005
    depends_on:
      db:
        condition: service_healthy

  identity:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolcbb-identity
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      RUST_LOG: info
      DATABASE_URL: postgres://schoolcbb:schoolcbb@db:5432/schoolcbb
    depends_on:
      db:
        condition: service_healthy

  sis:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolcbb-sis
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      RUST_LOG: info
      DATABASE_URL: postgres://schoolcbb:schoolcbb@db:5432/schoolcbb
    depends_on:
      db:
        condition: service_healthy

  academic:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolcbb-academic
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3003
      RUST_LOG: info
      DATABASE_URL: postgres://schoolcbb:schoolcbb@db:5432/schoolcbb
    depends_on:
      db:
        condition: service_healthy

  attendance:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolcbb-attendance
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3004
      RUST_LOG: info
      DATABASE_URL: postgres://schoolcbb:schoolcbb@db:5432/schoolcbb
    depends_on:
      db:
        condition: service_healthy

  notifications:
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolcbb-notifications
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3005
      RUST_LOG: info
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - gateway

volumes:
  pgdata:
