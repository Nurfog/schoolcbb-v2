services:
  db:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: schoolccb
      POSTGRES_PASSWORD: schoolccb
      POSTGRES_DB: schoolccb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolccb"]
      interval: 5s
      timeout: 5s
      retries: 5

  identity:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-identity
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 30s

  sis:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-sis
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 30s

  academic:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-academic
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3003
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 30s

  attendance:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-attendance
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3004
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3004/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 30s

  notifications:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-notifications
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3005
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3005/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 30s

  finance:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: schoolccb-finance
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 3006
      RUST_LOG: info
      DATABASE_URL: postgres://schoolccb:schoolccb@db:5432/schoolccb
      JWT_SECRET: cambio-en-produccion
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3006/health"]
      interval: 3s
